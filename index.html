<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>Training</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#000;}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;color:#fff;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input{-webkit-appearance:none;background:transparent;}
::-webkit-scrollbar{display:none;}
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root" style="height:100vh"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const MUSCLES=[{key:"Brust",label:"Brust"},{key:"Ruecken",label:"Rücken"},{key:"Schultern",label:"Schultern"},{key:"Bizeps",label:"Bizeps"},{key:"Trizeps",label:"Trizeps"},{key:"Unterarme",label:"Unterarme"},{key:"Bauch",label:"Bauch"},{key:"Beine",label:"Beine"},{key:"Quadrizeps",label:"Quadrizeps"},{key:"Hamstrings",label:"Hamstrings"},{key:"Waden",label:"Waden"},{key:"Gesaess",label:"Gesäß"}];
const VOL={Brust:{min:8,max:16},Ruecken:{min:8,max:16},Schultern:{min:6,max:14},Bizeps:{min:6,max:12},Trizeps:{min:6,max:12},Unterarme:{min:3,max:8},Bauch:{min:4,max:10},Beine:{min:8,max:16},Quadrizeps:{min:6,max:14},Hamstrings:{min:5,max:10},Waden:{min:4,max:10},Gesaess:{min:5,max:10}};
const CARDIO_TYPES=["Schwimmen","Laufen","Fahrrad","Rudern","Sonstiges"];
const CARDIO_UNIT={Schwimmen:"Bahnen",Laufen:"km",Fahrrad:"km",Rudern:"km",Sonstiges:"Einheit"};
const MON=["Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const DSHORT=["Mo","Di","Mi","Do","Fr","Sa","So"];
const DLONG=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
const TABS=["week","volume","progress","history"];
const TAB_LABELS=["Woche","Volumen","Fortschritt","Verlauf"];

const C={acc:"#aef520",acc2:"#8fd010",txt:"#ffffff",mut:"rgba(255,255,255,0.5)",blue:"#64d2ff",good:"#30d158",warn:"#ffd60a",danger:"#ff453a"};
const glass=(o=0.1)=>({background:"rgba(40,40,45,"+(0.4+o)+")",backdropFilter:"blur(40px) saturate(180%)",WebkitBackdropFilter:"blur(40px) saturate(180%)",border:"0.5px solid rgba(255,255,255,0.18)",boxShadow:"0 8px 32px rgba(0,0,0,0.35),inset 0 0.5px 0 rgba(255,255,255,0.25),inset 0 -0.5px 0 rgba(0,0,0,0.2)"});
const glassLight=()=>({background:"rgba(255,255,255,0.12)",backdropFilter:"blur(30px) saturate(170%)",WebkitBackdropFilter:"blur(30px) saturate(170%)",border:"0.5px solid rgba(255,255,255,0.25)",boxShadow:"inset 0 0.5px 0 rgba(255,255,255,0.35)"});
const glassAcc=()=>({background:"rgba(174,245,32,0.2)",backdropFilter:"blur(30px) saturate(180%)",WebkitBackdropFilter:"blur(30px) saturate(180%)",border:"0.5px solid rgba(174,245,32,0.45)",boxShadow:"0 4px 20px rgba(174,245,32,0.15),inset 0 0.5px 0 rgba(255,255,255,0.3)"});

function dk(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function monday(d){const x=new Date(d),day=x.getDay();x.setDate(x.getDate()+(day===0?-6:1-day));x.setHours(0,0,0,0);return x;}
function weekDays(off){const m=monday(new Date());m.setDate(m.getDate()+off*7);return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(d.getDate()+i);return d;});}
function getKW(d){const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()+3-(x.getDay()+6)%7);const w=new Date(x.getFullYear(),0,4);return 1+Math.round(((x-w)/86400000-3+(w.getDay()+6)%7)/7);}
function fmt(d){return d.getDate()+". "+MON[d.getMonth()]+" "+d.getFullYear();}
function ml(key){return(MUSCLES.find(m=>m.key===key)||{label:key}).label;}
function newEx(){return{id:Math.random(),name:"",muscle:"",sets:[{id:Math.random(),type:"working",weight:"",reps:""}]};}

function VolBar({label,total,target}){
  const pct=Math.min((total/target.max)*100,100);
  const col=total<target.min?C.warn:total<=target.max?C.good:C.danger;
  const hint=total<target.min?"Noch "+(target.min-total)+" bis Min":total<=target.max?total+"/"+target.max+" OK":total+" - zu viel";
  return(
    <div style={{...glass(0.05),borderRadius:14,padding:"12px 14px",marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <span style={{fontSize:13,fontWeight:600}}>{label}</span>
        <span style={{fontSize:12,color:C.mut}}><b style={{color:"#fff"}}>{total}</b>/{target.max}</span>
      </div>
      <div style={{background:"rgba(255,255,255,0.1)",borderRadius:6,height:6,overflow:"hidden",marginBottom:5}}>
        <div style={{height:"100%",width:pct+"%",background:col,borderRadius:6,transition:"width .4s ease"}}/>
      </div>
      <div style={{fontSize:11,color:col}}>{hint}</div>
    </div>
  );
}

function SwipeRow({children,onDelete}){
  const [off,setOff]=useState(0);
  const drag=useRef({active:false,startX:0,startY:0,locked:false});
  function ts(e){drag.current={active:true,startX:e.touches[0].clientX,startY:e.touches[0].clientY,locked:false};}
  function tm(e){
    if(!drag.current.active)return;
    const dx=drag.current.startX-e.touches[0].clientX;
    const dy=Math.abs(drag.current.startY-e.touches[0].clientY);
    if(!drag.current.locked){if(Math.abs(dx)<5&&dy<5)return;drag.current.locked=Math.abs(dx)>dy?"h":"v";}
    if(drag.current.locked!=="h")return;
    setOff(Math.max(0,Math.min(dx,90)));
  }
  function te(){drag.current.active=false;setOff(o=>o>45?80:0);}
  return(
    <div style={{position:"relative",marginBottom:10,borderRadius:16,overflow:"hidden"}} onTouchStart={ts} onTouchMove={tm} onTouchEnd={te}>
      <div style={{position:"absolute",right:0,top:0,bottom:0,width:80,background:"rgba(255,69,58,0.85)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"0 16px 16px 0"}}>
        <button onClick={onDelete} style={{background:"none",border:"none",color:"#fff",fontSize:24,cursor:"pointer"}}>🗑</button>
      </div>
      <div style={{transform:"translateX(-"+off+"px)",transition:drag.current.active&&drag.current.locked==="h"?"none":"transform .3s cubic-bezier(.25,.46,.45,.94)"}}>
        {children}
      </div>
    </div>
  );
}

function App(){
  const [S,setS]=useState(()=>{try{const d=localStorage.getItem("tl2");if(d)return JSON.parse(d);}catch(e){}return{};});
  const [wOff,setWOff]=useState(0);
  const [selKey,setSelKey]=useState(null);
  const [tabIdx,setTabIdx]=useState(0);
  const [selEx,setSelEx]=useState(null);
  const [mode,setMode]=useState("kraft");
  const [sMuscles,setSMuscles]=useState([]);
  const [exs,setExs]=useState([newEx()]);
  const [cType,setCType]=useState(null);
  const [cMetric,setCMetric]=useState("");
  const [cDur,setCDur]=useState("");
  const [deleted,setDeleted]=useState(null);
  const tabDrag=useRef({active:false,startX:0,startY:0,dx:0,locked:false});
  const [tabDx,setTabDx]=useState(0);
  const [tabSnap,setTabSnap]=useState(false);
  const weekDrag=useRef({active:false,startX:0,startY:0,dx:0,locked:false});
  const [weekDx,setWeekDx]=useState(0);
  const tabRef=useRef(null);

  useEffect(()=>{try{localStorage.setItem("tl2",JSON.stringify(S));}catch(e){};},[S]);
  useEffect(()=>{
    const el=tabRef.current;if(!el)return;
    const h=e=>{
      if(!tabDrag.current.active)return;
      const dx=e.touches[0].clientX-tabDrag.current.startX;
      const dy=e.touches[0].clientY-tabDrag.current.startY;
      if(!tabDrag.current.locked){if(Math.abs(dx)<8&&Math.abs(dy)<8)return;tabDrag.current.locked=Math.abs(dx)>Math.abs(dy)*1.2?"h":"v";}
      if(tabDrag.current.locked!=="h")return;
      e.preventDefault();
      if(dx>0&&tabIdx===0)return;
      if(dx<0&&tabIdx===TABS.length-1)return;
      tabDrag.current.dx=dx;setTabDx(dx);
    };
    el.addEventListener("touchmove",h,{passive:false});
    return()=>el.removeEventListener("touchmove",h);
  },[tabIdx]);

  const days=weekDays(wOff);
  const todayK=dk(new Date());

  function goTab(i){setTabSnap(true);setTabIdx(i);setTabDx(0);setTimeout(()=>setTabSnap(false),320);}
  function onTabTS(e){tabDrag.current={active:true,startX:e.touches[0].clientX,startY:e.touches[0].clientY,dx:0,locked:false};setTabSnap(false);}
  function onTabTE(){
    if(!tabDrag.current.active)return;tabDrag.current.active=false;
    if(tabDrag.current.locked!=="h"){setTabDx(0);return;}
    const dx=tabDrag.current.dx;setTabSnap(true);
    if(dx<-30&&tabIdx<TABS.length-1)setTabIdx(i=>i+1);
    else if(dx>30&&tabIdx>0)setTabIdx(i=>i-1);
    setTabDx(0);setTimeout(()=>setTabSnap(false),320);
  }
  function onWeekTS(e){weekDrag.current={active:true,startX:e.touches[0].clientX,startY:e.touches[0].clientY,dx:0,locked:false};}
  function onWeekTM(e){
    if(!weekDrag.current.active)return;
    const dx=e.touches[0].clientX-weekDrag.current.startX;
    const dy=e.touches[0].clientY-weekDrag.current.startY;
    if(!weekDrag.current.locked){if(Math.abs(dx)<8&&Math.abs(dy)<8)return;weekDrag.current.locked=Math.abs(dx)>Math.abs(dy)*1.2?"h":"v";}
    if(weekDrag.current.locked!=="h")return;
    weekDrag.current.dx=dx;setWeekDx(dx);e.stopPropagation();
  }
  function onWeekTE(){
    if(!weekDrag.current.active)return;weekDrag.current.active=false;
    if(weekDrag.current.locked!=="h"){setWeekDx(0);return;}
    const dx=weekDrag.current.dx;
    if(dx<-30)setWOff(w=>w+1);else if(dx>30)setWOff(w=>w-1);
    setWeekDx(0);
  }

  function openDay(d){
    const key=dk(d);setSelKey(key);
    const e=S[key];
    setMode(e?.mode||"kraft");setSMuscles(e?.muscles||[]);
    setExs(e?.exercises?.length?e.exercises.map(ex=>({...ex,id:ex.id||Math.random(),sets:ex.sets.map(s=>({...s,id:s.id||Math.random()}))})):[newEx()]);
    setCType(e?.cardio?.type||null);setCMetric(e?.cardio?.metric||"");setCDur(e?.cardio?.duration||"");
  }
  function addEx(){setExs(p=>[...p,newEx()]);}
  function removeEx(id){setExs(p=>p.filter(e=>e.id!==id));}
  function updEx(id,f,v){setExs(p=>p.map(e=>e.id===id?{...e,[f]:v}:e));}
  function addSet(eid){setExs(p=>p.map(e=>e.id===eid?{...e,sets:[...e.sets,{id:Math.random(),type:"working",weight:"",reps:""}]}:e));}
  function remSet(eid,sid){setExs(p=>p.map(e=>e.id===eid?{...e,sets:e.sets.filter(s=>s.id!==sid)}:e));}
  function togSet(eid,sid){setExs(p=>p.map(e=>e.id===eid?{...e,sets:e.sets.map(s=>s.id===sid?{...s,type:s.type==="working"?"warmup":"working"}:s)}:e));}
  function updSet(eid,sid,f,v){setExs(p=>p.map(e=>e.id===eid?{...e,sets:e.sets.map(s=>s.id===sid?{...s,[f]:v}:s)}:e));}
  function saveSession(){
    if(mode==="kardio"&&!cType){alert("Kardio-Art wählen.");return;}
    if((mode==="kraft"||mode==="both")&&sMuscles.length===0){alert("Muskelgruppe wählen.");return;}
    const cardio=cType?{type:cType,metric:cMetric,duration:cDur}:null;
    const cleanEx=exs.filter(e=>e.name.trim()).map(e=>({name:e.name,muscle:e.muscle||"",sets:e.sets}));
    setS(p=>({...p,[selKey]:{mode,muscles:sMuscles,exercises:cleanEx,cardio}}));
    setSelKey(null);
  }
  function delSess(key){
    const sess=S[key];setS(p=>{const n={...p};delete n[key];return n;});
    if(deleted?.timer)clearTimeout(deleted.timer);
    const timer=setTimeout(()=>setDeleted(null),6000);
    setDeleted({key,sess,timer});
  }
  function undoDelete(){
    if(!deleted)return;clearTimeout(deleted.timer);
    setS(p=>({...p,[deleted.key]:deleted.sess}));setDeleted(null);
  }
  function exportD(){
    const b=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
    const u=URL.createObjectURL(b);const a=document.createElement("a");
    a.href=u;a.download="training-"+dk(new Date())+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
  }
  function importD(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(typeof d==="object"){setS(d);alert("Import OK - "+Object.keys(d).length+" Sessions");}}catch{alert("Fehler");}e.target.value="";};
    r.readAsText(f);
  }

  const liveV={};
  exs.forEach(ex=>{if(!ex.muscle)return;ex.sets.forEach(s=>{if(s.type==="working")liveV[ex.muscle]=(liveV[ex.muscle]||0)+1;});});
  function weekVol(excl){
    const v={};
    days.forEach(d=>{
      const key=dk(d);if(key===excl)return;
      const sess=S[key];if(!sess?.exercises)return;
      sess.exercises.forEach(ex=>{if(!ex.muscle)return;ex.sets.forEach(s=>{if(s.type==="working")v[ex.muscle]=(v[ex.muscle]||0)+1;});});
    });
    return v;
  }
  const existV=weekVol(selKey);
  const volMuscles=[...new Set([...Object.keys(liveV),...Object.keys(existV)])];
  const selDay=selKey?new Date(selKey+"T12:00:00"):null;
  const selDI=selDay?(selDay.getDay()+6)%7:0;

  const inp={background:"rgba(255,255,255,0.08)",border:"0.5px solid rgba(255,255,255,0.18)",color:"#fff",fontFamily:"monospace",fontSize:13,borderRadius:10,padding:"7px 8px",width:"100%",textAlign:"center",outline:"none"};

  const WeekTab=(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"0 16px",marginBottom:14}}>
        <button onClick={()=>setWOff(w=>w-1)} style={{...glass(0.08),color:"#fff",width:34,height:34,borderRadius:10,cursor:"pointer",fontSize:18,border:"none"}}>‹</button>
        <span style={{fontSize:12,color:C.mut,flex:1,textAlign:"center",fontWeight:500}}>KW {getKW(days[0])} · {days[0].getDate()}. – {days[6].getDate()}. {MON[days[6].getMonth()]}</span>
        <button onClick={()=>setWOff(w=>w+1)} style={{...glass(0.08),color:"#fff",width:34,height:34,borderRadius:10,cursor:"pointer",fontSize:18,border:"none"}}>›</button>
      </div>
      <div onTouchStart={onWeekTS} onTouchMove={onWeekTM} onTouchEnd={onWeekTE} style={{transform:"translateX("+weekDx*0.25+"px)",transition:weekDrag.current.active&&weekDrag.current.locked==="h"?"none":"transform .2s ease"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,padding:"0 16px",marginBottom:20}}>
          {days.map((d,i)=>{
            const key=dk(d),sess=S[key];
            const hasL=sess&&(sess.mode==="kraft"||sess.mode==="both");
            const hasC=sess&&(sess.mode==="kardio"||sess.mode==="both");
            const isT=key===todayK,isSel=key===selKey;
            return(
              <div key={key} onClick={()=>openDay(d)} style={{
                background:hasL&&hasC?"rgba(174,245,32,0.12)":hasL?"rgba(143,208,16,0.1)":hasC?"rgba(100,210,255,0.1)":"rgba(255,255,255,0.06)",
                backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",
                border:"0.5px solid",borderColor:isSel?"rgba(174,245,32,0.8)":isT?"rgba(255,255,255,0.4)":hasL?"rgba(143,208,16,0.3)":hasC?"rgba(100,210,255,0.3)":"rgba(255,255,255,0.12)",
                boxShadow:isSel?"0 0 0 1.5px rgba(174,245,32,0.5),0 4px 16px rgba(174,245,32,0.15)":"none",
                borderRadius:14,padding:"7px 2px",textAlign:"center",cursor:"pointer",minHeight:66,
                display:"flex",flexDirection:"column",alignItems:"center",gap:2
              }}>
                <div style={{fontSize:9,fontWeight:700,color:isT?C.acc:C.mut,textTransform:"uppercase",letterSpacing:"0.5px"}}>{DSHORT[i]}</div>
                <div style={{fontSize:17,fontWeight:600,color:isT?C.acc:"#fff"}}>{d.getDate()}</div>
                {hasL&&<div style={{fontSize:7,fontWeight:700,padding:"1px 5px",borderRadius:8,...glassAcc()}}>{(sess.muscles||[]).slice(0,2).map(ml).join("+")}</div>}
                {hasC&&<div style={{fontSize:7,fontWeight:700,padding:"1px 5px",borderRadius:8,background:"rgba(100,210,255,0.2)",border:"0.5px solid rgba(100,210,255,0.4)",color:C.blue}}>{sess.cardio?.type||"Kardio"}</div>}
              </div>
            );
          })}
        </div>
      </div>
      {selKey&&(
        <div style={{...glass(0.1),borderRadius:22,padding:16,margin:"0 16px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <span style={{fontSize:15,fontWeight:700,color:"#fff",letterSpacing:"-0.3px"}}>{DLONG[selDI]}</span>
            <button onClick={()=>setSelKey(null)} style={{...glassLight(),width:28,height:28,borderRadius:8,border:"none",color:C.mut,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            {[["kraft","Kraft","lift"],["kardio","Kardio","cardio"],["both","Beides","lift"]].map(([m,lbl,type])=>(
              <div key={m} onClick={()=>setMode(m)} style={{flex:1,...(mode===m?(type==="cardio"?{background:"rgba(100,210,255,0.2)",border:"0.5px solid rgba(100,210,255,0.45)",boxShadow:"inset 0 0.5px 0 rgba(255,255,255,0.3)"}:glassAcc()):glass(0.06)),borderRadius:12,padding:"9px 4px",fontSize:12,fontWeight:600,cursor:"pointer",textAlign:"center",color:mode===m?(type==="cardio"?C.blue:C.acc):C.mut,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)"}}>{lbl}</div>
            ))}
          </div>
          {(mode==="kraft"||mode==="both")&&(
            <div>
              <div style={{fontSize:10,color:C.mut,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8,fontWeight:600}}>Muskelgruppen</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
                {MUSCLES.map(m=>(
                  <div key={m.key} onClick={()=>setSMuscles(p=>p.includes(m.key)?p.filter(x=>x!==m.key):[...p,m.key])} style={{...(sMuscles.includes(m.key)?{...glassAcc(),color:C.acc,fontWeight:700}:{...glass(0.06),color:C.mut,fontWeight:400}),borderRadius:20,padding:"5px 12px",fontSize:12,cursor:"pointer"}}>
                    {m.label}
                  </div>
                ))}
              </div>
              {exs.map((ex)=>(
                <div key={ex.id} style={{...glassLight(),borderRadius:16,padding:12,marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <input style={{flex:1,background:"transparent",border:"none",borderBottom:"0.5px solid rgba(255,255,255,0.2)",color:"#fff",fontSize:14,fontWeight:600,padding:"3px 0",outline:"none"}} placeholder="Übung" value={ex.name} onChange={e=>updEx(ex.id,"name",e.target.value)}/>
                    <button onClick={()=>removeEx(ex.id)} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:18}}>×</button>
                  </div>
                  {sMuscles.length>0&&(
                    <div>
                      <div style={{fontSize:9,color:C.mut,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:6,fontWeight:600}}>Fokus</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                        {sMuscles.map(mkey=>(
                          <div key={mkey} onClick={()=>updEx(ex.id,"muscle",ex.muscle===mkey?"":mkey)} style={{...(ex.muscle===mkey?{background:"rgba(143,208,16,0.25)",border:"0.5px solid rgba(143,208,16,0.5)",color:C.acc2,fontWeight:700}:{...glass(0.05),color:C.mut,fontWeight:400}),borderRadius:14,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>
                            {ml(mkey)}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  <div style={{display:"grid",gridTemplateColumns:"20px 44px 1fr 1fr 20px",gap:4,marginBottom:5}}>
                    {["#","Typ","kg","Wdh.",""].map((h,i)=><div key={i} style={{fontSize:9,color:C.mut,textTransform:"uppercase",letterSpacing:"0.5px",fontWeight:600}}>{h}</div>)}
                  </div>
                  {ex.sets.map((s,si)=>(
                    <div key={s.id} style={{display:"grid",gridTemplateColumns:"20px 44px 1fr 1fr 20px",gap:4,alignItems:"center",marginBottom:5}}>
                      <div style={{fontSize:10,color:C.mut,textAlign:"center",fontFamily:"monospace"}}>{si+1}</div>
                      <button onClick={()=>togSet(ex.id,s.id)} style={{...(s.type==="working"?glassAcc():{background:"rgba(255,214,10,0.15)",border:"0.5px solid rgba(255,214,10,0.35)"}),fontSize:9,fontWeight:700,borderRadius:8,padding:"6px 2px",cursor:"pointer",textAlign:"center",color:s.type==="working"?C.acc:C.warn}}>
                        {s.type==="working"?"Work":"Warm"}
                      </button>
                      <input style={inp} type="number" min="0" step="0.5" value={s.weight} placeholder="0" onChange={e=>updSet(ex.id,s.id,"weight",e.target.value)}/>
                      <input style={inp} type="number" min="0" value={s.reps} placeholder="0" onChange={e=>updSet(ex.id,s.id,"reps",e.target.value)}/>
                      <button onClick={()=>remSet(ex.id,s.id)} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:14}}>×</button>
                    </div>
                  ))}
                  <button onClick={()=>addSet(ex.id)} style={{...glass(0.05),border:"none",color:C.mut,borderRadius:10,padding:"7px",fontSize:12,cursor:"pointer",width:"100%",marginTop:6}}>+ Satz</button>
                </div>
              ))}
              <button onClick={addEx} style={{...glassAcc(),border:"none",color:C.acc,borderRadius:14,padding:"10px 14px",fontSize:13,fontWeight:600,cursor:"pointer",width:"100%",marginBottom:12}}>+ Übung hinzufügen</button>
              {volMuscles.length>0&&(
                <div>
                  <div style={{fontSize:10,color:C.mut,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8,fontWeight:600}}>Volumen diese Woche</div>
                  {volMuscles.map(mkey=><VolBar key={mkey} label={ml(mkey)} total={(existV[mkey]||0)+(liveV[mkey]||0)} target={VOL[mkey]||{min:8,max:16}}/>)}
                </div>
              )}
            </div>
          )}
          {(mode==="kardio"||mode==="both")&&(
            <div style={{marginTop:mode==="both"?14:0}}>
              <div style={{fontSize:10,color:C.mut,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8,fontWeight:600}}>Kardio</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                {CARDIO_TYPES.map(t=>(
                  <div key={t} onClick={()=>setCType(t)} style={{...(cType===t?{background:"rgba(100,210,255,0.2)",border:"0.5px solid rgba(100,210,255,0.45)",color:C.blue,fontWeight:600}:{...glass(0.06),color:C.mut,fontWeight:400}),borderRadius:20,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>
                    {t}
                  </div>
                ))}
              </div>
              {cType&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    <label style={{fontSize:10,color:C.mut,textTransform:"uppercase",letterSpacing:"0.8px",fontWeight:600}}>{CARDIO_UNIT[cType]||"Einheit"}</label>
                    <input style={{...inp,textAlign:"left",padding:"10px 12px",fontSize:15}} type="number" min="0" step="0.1" value={cMetric} onChange={e=>setCMetric(e.target.value)} placeholder="0"/>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    <label style={{fontSize:10,color:C.mut,textTransform:"uppercase",letterSpacing:"0.8px",fontWeight:600}}>Dauer (Min)</label>
                    <input style={{...inp,textAlign:"left",padding:"10px 12px",fontSize:15}} type="number" min="0" value={cDur} onChange={e=>setCDur(e.target.value)} placeholder="30"/>
                  </div>
                </div>
              )}
            </div>
          )}
          <div style={{height:14}}/>
          <button onClick={saveSession} style={{background:"linear-gradient(180deg,#bff232,#9bd615)",color:"#0a1a00",border:"none",borderRadius:16,padding:15,fontSize:15,fontWeight:700,cursor:"pointer",width:"100%",boxShadow:"0 6px 24px rgba(174,245,32,0.35),inset 0 1px 0 rgba(255,255,255,0.4)",letterSpacing:"-0.2px"}}>
            Session speichern
          </button>
        </div>
      )}
    </div>
  );

  const VolumeTab=(()=>{
    const vol={};let cMin=0,cSess=0;
    days.forEach(d=>{
      const sess=S[dk(d)];if(!sess)return;
      if(sess.exercises)sess.exercises.forEach(ex=>{if(!ex.muscle)return;ex.sets.forEach(s=>{if(s.type==="working")vol[ex.muscle]=(vol[ex.muscle]||0)+1;});});
      if(sess.cardio?.duration){cMin+=parseInt(sess.cardio.duration)||0;cSess++;}
    });
    const ok=cSess>=2;
    return(
      <div style={{padding:"0 16px"}}>
        <div style={{fontSize:11,color:C.mut,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:12,fontWeight:600}}>KW {getKW(days[0])} Übersicht</div>
        <div style={{...glass(0.06),borderRadius:18,padding:"14px 16px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:11,color:C.blue,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:4,fontWeight:600}}>Kardio</div>
            <div style={{fontSize:14,fontWeight:500}}>{cSess}/2 Sessions · {cMin} Min</div>
          </div>
          <div style={{fontSize:22,fontWeight:700,color:ok?C.good:C.warn}}>{ok?"✓":(60-cMin>0?(60-cMin)+"min":"✓")}</div>
        </div>
        {Object.keys(vol).length===0&&cSess===0&&<div style={{textAlign:"center",padding:40,color:C.mut,fontSize:14}}>Noch keine Sessions diese Woche.</div>}
        {Object.entries(vol).sort((a,b)=>b[1]-a[1]).map(([mkey,count])=>(
          <VolBar key={mkey} label={ml(mkey)} total={count} target={VOL[mkey]||{min:8,max:16}}/>
        ))}
      </div>
    );
  })();

  const ProgressTab=(()=>{
    const map={};
    Object.keys(S).sort().forEach(key=>{
      const sess=S[key];if(!sess?.exercises)return;
      sess.exercises.forEach(ex=>{
        if(!ex.name?.trim())return;
        const name=ex.name.trim();if(!map[name])map[name]=[];
        const ws=ex.sets.filter(s=>s.type==="working"&&s.weight&&s.reps);if(!ws.length)return;
        const bestW=Math.max(...ws.map(s=>parseFloat(s.weight)||0));
        const bestR=parseInt((ws.find(s=>parseFloat(s.weight)===bestW)||{reps:0}).reps)||0;
        const vol=ws.reduce((a,s)=>(parseFloat(s.weight)||0)*(parseInt(s.reps)||0)+a,0);
        const d=new Date(key+"T12:00:00");
        map[name].push({date:key,lbl:d.getDate()+". "+MON[d.getMonth()],bestW,bestR,vol});
      });
    });
    const names=Object.keys(map).sort();
    const active=selEx&&map[selEx]?selEx:null;
    const data=active?map[active]:null;
    return(
      <div style={{padding:"0 16px"}}>
        <div style={{fontSize:11,color:C.mut,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:12,fontWeight:600}}>Übungen</div>
        {!names.length&&<div style={{textAlign:"center",padding:40,color:C.mut,fontSize:14}}>Noch keine Übungen.</div>}
        <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:18}}>
          {names.map(n=>(
            <div key={n} onClick={()=>setSelEx(selEx===n?null:n)} style={{...(selEx===n?glassAcc():{...glass(0.06)}),borderRadius:20,padding:"7px 14px",fontSize:13,cursor:"pointer",fontWeight:selEx===n?700:400,color:selEx===n?C.acc:"#fff"}}>
              {n}
            </div>
          ))}
        </div>
        {data&&data.length>0&&(()=>{
          const maxW=Math.max(...data.map(d=>d.bestW));
          const minW=Math.min(...data.map(d=>d.bestW));
          const range=maxW-minW||1;
          const W=320,H=130,pL=36,pB=24,pT=16,pR=12,iW=W-pL-pR,iH=H-pT-pB;
          const pts=data.map((d,i)=>({x:pL+(data.length===1?iW/2:(i/(data.length-1))*iW),y:pT+iH-((d.bestW-minW)/range)*iH,d}));
          const diff=data[data.length-1].bestW-data[0].bestW;
          const diffP=data[0].bestW?((diff/data[0].bestW)*100).toFixed(1):0;
          return(
            <div>
              <div style={{...glass(0.08),borderRadius:18,padding:16,marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:12}}>
                  <div style={{fontSize:15,fontWeight:700,color:"#fff",letterSpacing:"-0.3px"}}>{active}</div>
                  <div style={{fontSize:13,color:diff>0?C.good:diff<0?C.danger:C.mut,fontWeight:600}}>{diff>0?"+":""}{diff}kg {diff!==0?"("+diffP+"%)":""}</div>
                </div>
                <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",overflow:"visible"}}>
                  {[0,0.5,1].map(t=>{const y=pT+iH*(1-t);return(<g key={t}><line x1={pL} y1={y} x2={W-pR} y2={y} stroke="rgba(255,255,255,0.08)" strokeWidth="1"/><text x={pL-4} y={y+3} textAnchor="end" fill="rgba(255,255,255,0.35)" fontSize="8" fontFamily="monospace">{(minW+range*t).toFixed(1)}</text></g>);})}
                  {pts.filter((_,i)=>i===0||i===pts.length-1||(pts.length>3&&i===Math.floor(pts.length/2))).map((p,i)=>(<text key={i} x={p.x} y={H} textAnchor="middle" fill="rgba(255,255,255,0.35)" fontSize="8" fontFamily="monospace">{p.d.lbl}</text>))}
                  {pts.length>1&&<polyline points={pts.map(p=>p.x+","+p.y).join(" ")} fill="none" stroke={C.acc} strokeWidth="2.5" strokeLinejoin="round"/>}
                  {pts.map((p,i)=>(<g key={i}><circle cx={p.x} cy={p.y} r="5" fill={C.acc} filter="url(#glow)"/><text x={p.x} y={p.y-10} textAnchor="middle" fill="#fff" fontSize="9" fontFamily="monospace" fontWeight="700">{p.d.bestW}kg</text></g>))}
                  <defs><filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                </svg>
              </div>
              {[...data].reverse().map((entry,i)=>(
                <div key={i} style={{...glass(0.06),borderRadius:14,padding:"12px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><div style={{fontSize:11,color:C.mut,marginBottom:3,fontWeight:500}}>{entry.lbl}</div><div style={{fontSize:14,fontWeight:600}}>{entry.bestW} kg × {entry.bestR} Wdh.</div></div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:10,color:C.mut,marginBottom:3}}>Volumen</div><div style={{fontSize:13,color:C.acc2,fontWeight:600,fontFamily:"monospace"}}>{entry.vol} kg</div></div>
                </div>
              ))}
            </div>
          );
        })()}
      </div>
    );
  })();

  const HistoryTab=(
    <div style={{padding:"0 16px"}}>
      <div style={{fontSize:11,color:C.mut,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:12,fontWeight:600}}>Alle Sessions</div>
      {Object.keys(S).length===0&&<div style={{textAlign:"center",padding:40,color:C.mut,fontSize:14}}>Noch keine Sessions.</div>}
      {Object.keys(S).sort().reverse().map(key=>{
        const sess=S[key],d=new Date(key+"T12:00:00");
        const dn=["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
        const isC=sess.mode==="kardio";
        const tw=sess.exercises?.reduce((a,ex)=>a+ex.sets.filter(s=>s.type==="working").length,0)||0;
        const ml2=sess.mode==="both"?"Kraft + Kardio":isC?"Kardio":(sess.muscles||[]).map(ml).join(" + ");
        return(
          <SwipeRow key={key} onDelete={()=>delSess(key)}>
            <div style={{...glass(0.07),borderRadius:16,padding:14}}>
              <div style={{marginBottom:8}}>
                <div style={{fontSize:14,fontWeight:700,color:isC?C.blue:C.acc,letterSpacing:"-0.2px"}}>{dn}, {fmt(d)}</div>
                <div style={{fontSize:12,color:C.mut,marginTop:2,fontWeight:500}}>{ml2}{tw?" · "+tw+" Arbeitssätze":""}</div>
              </div>
              {sess.exercises?.filter(e=>e.name).map((ex,i)=>(
                <div key={i} style={{fontSize:12,marginBottom:5}}>
                  <b style={{fontWeight:600}}>{ex.name}</b>{ex.muscle&&<span style={{fontSize:10,color:C.mut,marginLeft:5}}>({ml(ex.muscle)})</span>}
                  <div style={{fontFamily:"monospace",fontSize:10,color:C.mut,marginTop:2}}>
                    {ex.sets.filter(s=>s.type==="warmup").length>0&&<span>{ex.sets.filter(s=>s.type==="warmup").length}× Warm&nbsp;&nbsp;</span>}
                    {ex.sets.filter(s=>s.type==="working").map((s,j)=><span key={j}>{s.weight}kg×{s.reps}&nbsp;&nbsp;</span>)}
                  </div>
                </div>
              ))}
              {sess.cardio&&<div style={{fontSize:12,color:C.blue,marginTop:4}}>{sess.cardio.type} · {sess.cardio.metric} {CARDIO_UNIT[sess.cardio.type]||""}, {sess.cardio.duration} Min</div>}
            </div>
          </SwipeRow>
        );
      })}
    </div>
  );

  const tabContent=[WeekTab,VolumeTab,ProgressTab,HistoryTab];

  return(
    <div style={{background:"#000",height:"100vh",color:"#fff",fontFamily:"-apple-system,BlinkMacSystemFont,system-ui,sans-serif",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
      {/* Ambient orbs */}
      <div style={{position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none",zIndex:0}}>
        <div style={{position:"absolute",top:"-15%",left:"-20%",width:"70%",height:"45%",borderRadius:"50%",background:"radial-gradient(circle,rgba(174,245,32,0.28) 0%,transparent 70%)",filter:"blur(60px)"}}/>
        <div style={{position:"absolute",top:"30%",right:"-25%",width:"75%",height:"50%",borderRadius:"50%",background:"radial-gradient(circle,rgba(100,210,255,0.2) 0%,transparent 70%)",filter:"blur(70px)"}}/>
        <div style={{position:"absolute",bottom:"-10%",left:"10%",width:"60%",height:"40%",borderRadius:"50%",background:"radial-gradient(circle,rgba(120,80,255,0.18) 0%,transparent 70%)",filter:"blur(70px)"}}/>
        <div style={{position:"absolute",top:"55%",left:"-15%",width:"50%",height:"35%",borderRadius:"50%",background:"radial-gradient(circle,rgba(48,209,88,0.14) 0%,transparent 70%)",filter:"blur(60px)"}}/>
      </div>

      {/* Header */}
      <div style={{padding:"52px 20px 16px",flexShrink:0,position:"relative",zIndex:1}}>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:14}}>
          <div>
            <div style={{fontSize:32,fontWeight:800,color:"#fff",letterSpacing:"-1px",lineHeight:1}}>Training</div>
            <div style={{fontSize:13,color:C.mut,marginTop:4,fontWeight:500}}>{DLONG[(new Date().getDay()+6)%7]}, {fmt(new Date())}</div>
          </div>
          <div style={{...glassAcc(),width:48,height:48,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>💪</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={exportD} style={{flex:1,...glass(0.08),border:"none",color:C.acc,borderRadius:14,padding:"10px 0",fontSize:13,fontWeight:600,cursor:"pointer"}}>↓ Export</button>
          <label style={{flex:1,...glass(0.08),color:C.mut,borderRadius:14,padding:"10px 0",fontSize:13,fontWeight:600,cursor:"pointer",textAlign:"center",display:"block"}}>↑ Import<input type="file" accept=".json" style={{display:"none"}} onChange={importD}/></label>
        </div>
      </div>

      {deleted&&(
        <div style={{margin:"0 16px 8px",...glass(0.12),borderRadius:16,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,position:"relative",zIndex:1}}>
          <span style={{fontSize:13,color:C.mut}}>Session gelöscht</span>
          <button onClick={undoDelete} style={{...glassAcc(),border:"none",color:C.acc,borderRadius:10,padding:"6px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Rückgängig</button>
        </div>
      )}

      {/* Tab bar */}
      <div style={{display:"flex",gap:0,margin:"0 16px 12px",padding:4,...glass(0.06),borderRadius:16,flexShrink:0,position:"relative",zIndex:1}}>
        {TAB_LABELS.map((lbl,i)=>(
          <div key={i} onClick={()=>goTab(i)} style={{flex:1,...(tabIdx===i?glassLight():{background:"transparent",border:"0.5px solid transparent"}),borderRadius:12,padding:"8px 2px",fontSize:12,fontWeight:tabIdx===i?700:500,cursor:"pointer",textAlign:"center",color:tabIdx===i?"#fff":C.mut,transition:"all .25s ease"}}>
            {lbl}
          </div>
        ))}
      </div>

      {/* Content */}
      <div ref={tabRef} onTouchStart={onTabTS} onTouchEnd={onTabTE}
        style={{flex:1,display:"flex",width:"400%",transform:"translateX(calc(-"+tabIdx*25+"% + "+(tabDx/4)+"px))",transition:tabSnap||!tabDrag.current.active||tabDrag.current.locked!=="h"?"transform .3s cubic-bezier(.25,.46,.45,.94)":"none",willChange:"transform",alignItems:"stretch",overflow:"hidden",position:"relative",zIndex:1}}>
        {tabContent.map((content,i)=>(
          <div key={i} style={{width:"25%",minWidth:"25%",flexShrink:0,overflowY:"auto",WebkitOverflowScrolling:"touch",paddingBottom:32}}>
            {content}
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
